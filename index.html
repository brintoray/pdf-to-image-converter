<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Image Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold text-center mb-6 text-gray-800">PDF to Image Converter</h1>
        <p class="text-center text-gray-600 mb-6">Upload a PDF file and convert it to a single long vertical image</p>
        
        <form id="uploadForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Choose PDF file</label>
                <input 
                    type="file" 
                    id="pdfFile" 
                    accept=".pdf"
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
            </div>
            <button 
                type="submit" 
                id="convertButton"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
            >
                Convert
            </button>
        </form>
        
        <div id="loading" class="hidden text-center py-4">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto"></div>
            <p class="mt-2 text-gray-600">Converting...</p>
        </div>
        
        <div id="errorMessage" class="hidden text-center p-4 bg-red-100 text-red-600 rounded-md"></div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('pdfFile');
            const file = fileInput.files[0];
            const button = document.getElementById('convertButton');
            const loading = document.getElementById('loading');
            const errorMessage = document.getElementById('errorMessage');
            
            // Reset error message
            errorMessage.classList.add('hidden');
            errorMessage.textContent = '';
            
            // Validate file
            if (!file) {
                showError('Please select a PDF file');
                return;
            }
            
            if (!file.name.toLowerCase().endsWith('.pdf')) {
                showError('Only PDF files are allowed');
                return;
            }
            
            // Limit file size to 10MB
            if (file.size > 10 * 1024 * 1024) {
                showError('File size must be less than 10MB');
                return;
            }
            
            // Show loading state
            button.disabled = true;
            loading.classList.remove('hidden');
            
            try {
                const formData = new FormData();
                formData.append('file', file);
                
                const response = await fetch('/convert', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Conversion failed');
                }
                
                // Get the blob (image data)
                const blob = await response.blob();
                
                // Create a download link and trigger download
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = 'converted.png';
                document.body.appendChild(a);
                a.click();
                a.remove();
                
                // Clean up
                window.URL.revokeObjectURL(downloadUrl);
                
            } catch (error) {
                showError(error.message);
            } finally {
                // Hide loading and re-enable button
                button.disabled = false;
                loading.classList.add('hidden');
            }
        });
        
        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorMessage.classList.remove('hidden');
        }
    </script>
</body>
</html>
